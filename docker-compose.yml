version: '3.8'

services:
  chord-genesis:
    build: 
      context: /var/www/zaylegend/docker-apps/chord-genesis
      dockerfile: Dockerfile
    container_name: chord-genesis
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks:
      - portfolio-network
    environment:
      - NODE_ENV=production

  spritegen:
    build: 
      context: /var/www/zaylegend/docker-apps/spritegen
      dockerfile: Dockerfile
    container_name: spritegen
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - portfolio-network
    environment:
      - NODE_ENV=production

  dj-visualizer:
    build: 
      context: /var/www/zaylegend/docker-apps/dj-visualizer
      dockerfile: Dockerfile
    container_name: dj-visualizer
    ports:
      - "3003:3000"
    restart: unless-stopped
    networks:
      - portfolio-network
    environment:
      - NODE_ENV=production

  fineline:
    build: 
      context: /var/www/zaylegend/docker-apps/fineline
      dockerfile: Dockerfile
    container_name: fineline
    ports:
      - "3004:3000"
    restart: unless-stopped
    networks:
      - portfolio-network
    environment:
      - NODE_ENV=production

  game-hub:
    build: 
      context: /var/www/zaylegend/docker-apps/game-hub
      dockerfile: Dockerfile
    container_name: game-hub
    ports:
      - "3005:3000"
    restart: unless-stopped
    networks:
      - portfolio-network
    environment:
      - NODE_ENV=production

  # ============ INFRASTRUCTURE SERVICES ============

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: portfolio-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  portfolio-network:
    driver: bridge

volumes:
  app-data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local