version: '3.8'

networks:
  portfolio-network:
    name: portfolio-network
    driver: bridge

services:
  portfolio:
    build:
      context: ../apps/portfolio
      args:
        VITE_BASE_PATH: '/'
    container_name: portfolio-portfolio
    restart: unless-stopped
    ports:
      - "8080://github.com/yetog/portfolio.git"
    networks:
      - portfolio-network
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost://github.com/yetog/portfolio.git"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  zen-reset:
    build:
      context: ../apps/zen-reset
      args:
        VITE_BASE_PATH: '/zen-reset/'
    container_name: portfolio-zen-reset
    restart: unless-stopped
    ports:
      - "3001://github.com/yetog/zen-reset-123.git"
    networks:
      - portfolio-network
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost://github.com/yetog/zen-reset-123.git"]
