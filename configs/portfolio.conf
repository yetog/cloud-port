    location /narrative-navigator/ {
        alias /var/www/zaylegend/apps/testing/narrative-navigator/dist/;
        index index.html;
        try_files $uri $uri/ /narrative-navigator/index.html;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Daily Brief - Gentle Future Platform Hub (Static build)
    location /daily-brief {
