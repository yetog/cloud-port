    }

    # IONOS Cloud Exam Prep (Static build)
    location /ionos-exam {
        return 301 /ionos-exam/;
    }
    location /ionos-exam/ {
        alias /var/www/zaylegend/apps/IONOS-Cloud-Exam-Prep/dist/;
        try_files $uri $uri/ /ionos-exam/index.html;
    }

    # Green Empire Landscaping (Client Project - Static)
    location /green-empire {
        return 301 /green-empire/;
    }
    location /green-empire/ {
        alias /var/www/zaylegend/apps/green-empire/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Block source files
        location ~ \.(py|sh|md)$ {
            return 404;
        }
    }

    # SLAM OG Studio - Web DAW
    location /slam-og-studio {
        return 301 /slam-og-studio/;
    }
    location /slam-og-studio/ {
        alias /var/www/zaylegend/apps/slam-og-studio/dist/;
        index index.html;
        try_files $uri $uri/ /slam-og-studio/index.html;

        # Required headers for AudioWorklet and SharedArrayBuffer
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }
    }

    # Narrative Navigator (Static build)
    location /narrative-navigator {
